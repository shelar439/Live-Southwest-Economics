name: Deploy to Posit Connect Cloud
on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v3

      - name: Establish Native R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Deploy Script Directly to Posit Connect Cloud
        uses: rstudio/actions/connect-cloud-deploy@v1
        with:
          primary-doc: 'southwest_economics.Rmd'
